name: Monitor Skills

# Minimal dispatcher. The real pipeline lives in
# papermoonio/workflows-private/.github/workflows/task-monitor-skills.yml.
# This workflow mints a GitHub App token and triggers that workflow
# via the workflow_dispatch API. This pattern is used (instead of
# calling the private workflow as a reusable workflow via `uses:`)
# because public repos cannot call private reusable workflows.
#
# Event-to-mode mapping:
#   push / reference-code-updated   → full              (detect + triage-loop + generate-loop)
#   workflow_dispatch               → triage-only or full (user chooses)
#   repository_dispatch:
#     - triage-batch-full           → triage-batch-full  (continue triage, then generate)
#     - triage-batch-only           → triage-batch-only  (continue triage, then stop)
#     - generate-batch              → generate-batch     (continue generate loop)

on:
  push:
    branches: [master]
    paths: ["**/*.md"]
  repository_dispatch:
    types:
      - generate-batch
      - triage-batch-full
      - triage-batch-only
      - reference-code-updated
  workflow_dispatch:
    inputs:
      triage-only:
        description: "If true, run triage to completion then stop (never generate skills)"
        required: false
        type: boolean
        default: false
      triage-batch-size:
        description: "Max uncovered pages to classify per triage run (default 5)"
        required: false
        type: number
        default: 5
      batch-size:
        description: "Max new candidates to generate per run (default 5)"
        required: false
        type: number
        default: 5
      no-chain:
        description: "If true, run one batch and stop (no auto-chaining)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Mint App token for workflows-private
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SKILLS_APP_ID }}
          private-key: ${{ secrets.SKILLS_APP_PRIVATE_KEY }}
          owner: papermoonio
          repositories: workflows-private

      - name: Determine mode
        id: mode
        run: |
          set -euo pipefail
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"

          if [ "$EVENT" = "repository_dispatch" ] && [ "$ACTION" = "generate-batch" ]; then
            MODE="generate-batch"
          elif [ "$EVENT" = "repository_dispatch" ] && [ "$ACTION" = "triage-batch-full" ]; then
            MODE="triage-batch-full"
          elif [ "$EVENT" = "repository_dispatch" ] && [ "$ACTION" = "triage-batch-only" ]; then
            MODE="triage-batch-only"
          elif [ "$EVENT" = "workflow_dispatch" ] && [ "${{ github.event.inputs['triage-only'] }}" = "true" ]; then
            MODE="triage-only"
          else
            MODE="full"
          fi

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Selected mode: $MODE"

      - name: Trigger skill generation pipeline
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          set -euo pipefail
          # Preserve user's original settings across chained iterations.
          # - workflow_dispatch → values come from github.event.inputs
          # - repository_dispatch (self-chain) → values come from github.event.client_payload
          #   (workflows-private includes them when dispatching generate-batch or triage-batch-*)
          # - repository_dispatch without a payload → fall back to defaults
          TRIAGE_BATCH_SIZE="${{ github.event.inputs['triage-batch-size'] || github.event.client_payload['triage-batch-size'] || 5 }}"
          BATCH_SIZE="${{ github.event.inputs['batch-size'] || github.event.client_payload['batch-size'] || 5 }}"
          NO_CHAIN="${{ github.event.inputs['no-chain'] || github.event.client_payload['no-chain'] || 'false' }}"

          echo "Dispatching task-monitor-skills.yml with:"
          echo "  docs-owner: ${{ github.repository_owner }}"
          echo "  docs-name: ${{ github.event.repository.name }}"
          echo "  docs-branch: ${{ github.event.repository.default_branch }}"
          echo "  mode: $MODE"
          echo "  triage-batch-size: $TRIAGE_BATCH_SIZE"
          echo "  batch-size: $BATCH_SIZE"
          echo "  no-chain: $NO_CHAIN"

          gh workflow run task-monitor-skills.yml \
            --repo papermoonio/workflows-private \
            --ref main \
            -f docs-owner="${{ github.repository_owner }}" \
            -f docs-name="${{ github.event.repository.name }}" \
            -f docs-branch="${{ github.event.repository.default_branch }}" \
            -f hub-owner="papermoonio" \
            -f hub-name="agent-ready-docs-hub" \
            -f project-id="polkadot-docs" \
            -f mode="$MODE" \
            -f triage-batch-size="$TRIAGE_BATCH_SIZE" \
            -f batch-size="$BATCH_SIZE" \
            -f no-chain="$NO_CHAIN"
